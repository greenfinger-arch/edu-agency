<!DOCTYPE HTML>
<html lang="ko">
<head>
    <title>신청 완료 | 에듀디자인스 랩</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 24px; text-align: center; color: #222; }
        .card { background: #fff; padding: 60px 40px; border-radius: 20px; border: 1px solid #e2e8f0; box-shadow: 0 20px 40px rgba(0,0,0,0.03); max-width: 500px; width: 100%; }
        .icon { width: 80px; height: 80px; background: rgba(0, 102, 255, 0.06); color: #0066ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px; font-size: 2.5rem; }
        h1 { font-size: 2rem; font-weight: 900; margin-bottom: 15px; color: #111; }
        p { color: #64748b; font-size: 1.1rem; line-height: 1.6; margin-bottom: 40px; word-break: keep-all; }
        .btn { display: inline-block; padding: 16px 32px; background: #0066ff; color: #fff; font-weight: 700; text-decoration: none; border-radius: 8px; transition: 0.3s; box-shadow: 0 10px 20px rgba(0, 102, 255, 0.1); }
        .btn:hover { background: #0052cc; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon"><i class="fa-solid fa-circle-check"></i></div>
        <h1>진단 신청이 완료되었습니다</h1>
        <p>에듀디자인스 랩을 선택해 주셔서 감사합니다.<br>입력해 주신 연락처로 24시간 이내에 대표 서포터가 직접 연락을 드려 맞춤형 컨설팅을 안내해 드리겠습니다.</p>
        <a href="index.html" class="btn">메인 화면으로 돌아가기</a>
    </div>
</body>
</html>
